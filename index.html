<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FoxTV - Stable Build</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { 
            background-color: #0f172a; 
            color: #f8fafc; 
            font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            -webkit-tap-highlight-color: transparent; 
            margin: 0; 
            padding: 0;
            overflow: hidden; 
        }
        
        /* FoxTV Design */
        .channel-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid transparent; }
        .channel-card:active { transform: scale(0.96); }
        .active-channel { background-color: #1e293b; border-color: #f97316; box-shadow: 0 0 15px rgba(249, 115, 22, 0.2); }
        
        .progress-bar { height: 4px; background: #334155; border-radius: 2px; overflow: hidden; }
        .progress-fill { height: 100%; background: #f97316; transition: width 0.5s ease; }

        /* Dynamic Layout States */
        .mode-mobile { overflow-y: auto !important; }
        .mode-mobile .main-container { flex-direction: column !important; height: auto !important; }
        .mode-mobile #video-section { position: sticky; top: 0; z-index: 50; background: #0f172a; padding: 12px !important; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5); }
        .mode-mobile .sidebar { width: 100% !important; height: auto !important; border-left: none !important; }

        .mode-desktop { overflow: hidden !important; }
        .mode-desktop .main-container { flex-direction: row !important; height: calc(100vh - 64px) !important; }
        .mode-desktop .sidebar { width: 380px !important; height: 100% !important; border-left: 1px solid #1e293b; }

        /* Fullscreen Styling */
        #player-container:-webkit-full-screen { width: 100%; height: 100%; background: black; display: flex; align-items: center; justify-content: center; }
        #player-container:fullscreen { width: 100%; height: 100%; background: black; display: flex; align-items: center; justify-content: center; }

        video { 
            background: #000; 
            width: 100%; 
            height: 100%;
            border-radius: 12px; 
            display: block;
            object-fit: contain;
        }
        
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0f172a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }

        #setup-overlay { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); }
    </style>
</head>
<body id="app-body" class="mode-desktop">

    <!-- Profil-Auswahl (Erwachsener & Kids) -->
    <div id="setup-overlay" class="fixed inset-0 z-[100] flex items-center justify-center bg-slate-950/95 p-4">
        <div class="bg-slate-900 border border-slate-800 p-8 rounded-[40px] max-w-md w-full text-center shadow-2xl">
            <h2 class="text-4xl font-black mb-2 text-white italic tracking-tighter">FOX<span class="text-orange-500">TV</span></h2>
            <p class="text-slate-500 text-[10px] tracking-[0.4em] uppercase mb-10 font-bold italic">Profil wählen</p>
            <div class="grid grid-cols-2 gap-8">
                <div onclick="login('Erwachsener', '🦊')" class="cursor-pointer group">
                    <div class="w-24 h-24 mx-auto bg-slate-800 rounded-full flex items-center justify-center text-4xl group-hover:ring-4 ring-orange-500 transition-all shadow-2xl transform group-hover:-translate-y-1">🦊</div>
                    <p class="mt-4 text-sm font-black text-slate-400 group-hover:text-white uppercase tracking-wider">Erwachsener</p>
                </div>
                <div onclick="login('Kids', '🐥')" class="cursor-pointer group">
                    <div class="w-24 h-24 mx-auto bg-slate-800 rounded-full flex items-center justify-center text-4xl group-hover:ring-4 ring-orange-500 transition-all shadow-2xl transform group-hover:-translate-y-1">🐥</div>
                    <p class="mt-4 text-sm font-black text-slate-400 group-hover:text-white uppercase tracking-wider">Kids</p>
                </div>
            </div>
        </div>
    </div>

    <!-- Navigation -->
    <nav class="h-16 bg-slate-900 border-b border-slate-800 px-6 flex items-center justify-between sticky top-0 z-[60]">
        <div class="flex items-center gap-2">
            <span class="text-2xl font-black italic tracking-tighter">FOX<span class="text-orange-500">TV</span></span>
        </div>
        <div class="flex items-center gap-4">
            <div id="res-monitor" class="hidden md:block text-[10px] font-mono text-slate-500 bg-slate-950 px-3 py-1 rounded-full border border-slate-800">SYNCING...</div>
            <div id="user-display" class="w-10 h-10 rounded-full bg-slate-800 flex items-center justify-center text-xl border border-slate-700 shadow-inner">?</div>
        </div>
    </nav>

    <main class="main-container flex">
        <!-- Player Bereich -->
        <section id="video-section" class="flex-1 p-4 lg:p-10 flex flex-col">
            <div id="player-container" class="relative aspect-video bg-black rounded-3xl overflow-hidden shadow-2xl border border-white/5">
                <video id="player" playsinline controls></video>
                <div id="idle-ui" class="absolute inset-0 flex flex-col items-center justify-center bg-slate-900/90 text-center p-6 z-10 pointer-events-none">
                    <div class="w-20 h-20 bg-slate-800/50 rounded-full flex items-center justify-center mb-6 animate-pulse border border-white/10">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-10 w-10 text-orange-500 translate-x-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z" /></svg>
                    </div>
                    <p class="text-slate-300 text-lg font-bold">Wähle einen Sender</p>
                    <p class="text-slate-500 text-sm mt-1">Live-Streaming bereit</p>
                </div>
            </div>
            
            <div class="mt-8">
                <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-6">
                    <div class="flex items-center gap-4">
                        <span id="live-indicator" class="hidden px-3 py-1 bg-red-600 text-[10px] font-black rounded-full uppercase animate-pulse shadow-lg shadow-red-900/20">Live</span>
                        <h2 id="active-title" class="text-3xl font-black italic text-white truncate tracking-tight">FoxTV Player</h2>
                    </div>
                    <!-- Externer Vollbild Button -->
                    <button onclick="toggleFullscreen()" class="bg-orange-600 hover:bg-orange-500 active:scale-95 text-white text-xs font-black py-4 px-8 rounded-2xl transition-all shadow-xl shadow-orange-900/20 flex items-center justify-center gap-3 tracking-widest">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 8V4m0 0h4M4 4l5 5m11-1V4m0 0h-4m4 0l-5 5M4 16v4m0 0h4m-4 0l5-5m11 5l-5-5m5 5v-4m0 4h-4" /></svg>
                        VOLLBILD
                    </button>
                </div>

                <div id="epg-info" class="hidden mt-8 p-6 bg-slate-900/40 rounded-3xl border border-white/5 backdrop-blur-sm">
                    <div class="flex justify-between items-center mb-4">
                        <p id="now-text" class="text-orange-500 text-sm font-black italic uppercase tracking-wider">Läuft gerade</p>
                        <span class="text-[10px] text-slate-500 font-mono" id="time-indicator">00:00</span>
                    </div>
                    <div class="progress-bar">
                        <div id="prog-bar-fill" class="progress-fill" style="width: 0%"></div>
                    </div>
                </div>
            </div>
        </section>

        <!-- Sidebar -->
        <aside class="sidebar flex flex-col bg-slate-900/50 backdrop-blur-md">
            <div class="p-5 border-b border-slate-800 bg-slate-900/80 sticky top-0 z-10">
                <input type="text" id="search-input" placeholder="Sender suchen..." class="w-full bg-slate-800 border border-slate-700/50 rounded-2xl p-4 text-sm text-white focus:ring-2 focus:ring-orange-500/50 outline-none transition-all placeholder:text-slate-500">
            </div>
            <div id="channel-list-container" class="flex-1 overflow-y-auto custom-scrollbar p-4 space-y-3">
                <!-- Kanäle werden hier geladen -->
            </div>
        </aside>
    </main>

    <script>
        const appBody = document.getElementById('app-body');
        const resMonitor = document.getElementById('res-monitor');
        const videoPlayer = document.getElementById('player');
        const playerContainer = document.getElementById('player-container');
        const idleUi = document.getElementById('idle-ui');
        let hlsInstance = null;
        let channelData = [];

        // 10ms Echtzeit Layout-Überwachung
        setInterval(() => {
            const w = window.innerWidth;
            resMonitor.textContent = `SCREEN: ${w}PX`;
            if (w < 1024) {
                if (!appBody.classList.contains('mode-mobile')) {
                    appBody.className = 'mode-mobile';
                }
            } else {
                if (!appBody.classList.contains('mode-desktop')) {
                    appBody.className = 'mode-desktop';
                }
            }
        }, 10);

        function login(name, icon) {
            document.getElementById('user-display').textContent = icon;
            document.getElementById('setup-overlay').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('setup-overlay').classList.add('hidden');
            }, 300);
            fetchM3U();
        }

        async function fetchM3U() {
            try {
                const response = await fetch("https://raw.githubusercontent.com/josxha/german-tv-m3u/main/german-tv.m3u");
                if (!response.ok) throw new Error("Netzwerkfehler");
                const m3uText = await response.text();
                parseChannels(m3uText);
            } catch (err) { 
                console.error("M3U Load Fail:", err);
            }
        }

        function parseChannels(text) {
            const lines = text.split('\n');
            channelData = [];
            let temp = null;
            lines.forEach(line => {
                if(line.startsWith('#EXTINF:')) {
                    temp = { 
                        name: line.split(',').pop().trim(), 
                        logo: line.match(/tvg-logo="([^"]+)"/)?.[1] 
                    };
                } else if(line.startsWith('http') && temp) {
                    temp.url = line.trim();
                    channelData.push(temp);
                    temp = null;
                }
            });
            renderChannels(channelData);
        }

        function renderChannels(list) {
            const container = document.getElementById('channel-list-container');
            container.innerHTML = list.map((c) => `
                <div onclick="startStream('${c.url}', '${c.name}', this)" class="channel-card p-4 rounded-2xl bg-slate-800/40 flex items-center gap-4 cursor-pointer border border-white/5 hover:border-orange-500/30">
                    <div class="w-12 h-12 bg-slate-900 rounded-xl flex-shrink-0 flex items-center justify-center border border-slate-700 overflow-hidden">
                        ${c.logo ? `<img src="${c.logo}" class="w-full h-full object-contain" onerror="this.src='https://via.placeholder.com/50?text=TV'">` : `<span class="text-xs text-slate-500 font-black">${c.name.slice(0,2)}</span>`}
                    </div>
                    <div class="flex-1 min-w-0">
                        <p class="text-sm font-black text-white truncate uppercase tracking-tight">${c.name}</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase tracking-widest mt-0.5">FoxTV Online</p>
                    </div>
                </div>
            `).join('');
        }

        function startStream(url, name, element) {
            document.querySelectorAll('.channel-card').forEach(card => card.classList.remove('active-channel'));
            element.classList.add('active-channel');
            
            idleUi.classList.add('hidden');
            document.getElementById('active-title').textContent = name;
            document.getElementById('live-indicator').classList.remove('hidden');
            document.getElementById('epg-info').classList.remove('hidden');
            document.getElementById('now-text').textContent = name + " LIVE";
            document.getElementById('prog-bar-fill').style.width = (Math.random() * 50 + 10) + "%";

            // Video Reset Logic
            if (hlsInstance) {
                hlsInstance.destroy();
                hlsInstance = null;
            }
            videoPlayer.pause();
            videoPlayer.removeAttribute('src');
            videoPlayer.load();

            if (Hls.isSupported()) {
                hlsInstance = new Hls({ capLevelToPlayerSize: true, responsive: true });
                hlsInstance.loadSource(url);
                hlsInstance.attachMedia(videoPlayer);
                hlsInstance.on(Hls.Events.MANIFEST_PARSED, () => {
                    videoPlayer.play().catch(() => console.log("User Interaction Needed"));
                });
            } else if (videoPlayer.canPlayType('application/vnd.apple.mpegurl')) {
                videoPlayer.src = url;
                videoPlayer.addEventListener('loadedmetadata', () => videoPlayer.play(), { once: true });
            }

            if (appBody.classList.contains('mode-mobile')) {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.webkitFullscreenElement) {
                const req = playerContainer.requestFullscreen || playerContainer.webkitRequestFullscreen || playerContainer.msRequestFullscreen;
                if (req) {
                    req.call(playerContainer).catch(() => {
                        if (videoPlayer.webkitEnterFullscreen) videoPlayer.webkitEnterFullscreen();
                    });
                } else if (videoPlayer.webkitEnterFullscreen) {
                    videoPlayer.webkitEnterFullscreen();
                }
            } else {
                const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
                if (exit) exit.call(document);
            }
        }

        document.getElementById('search-input').addEventListener('input', e => {
            const filter = e.target.value.toLowerCase();
            renderChannels(channelData.filter(c => c.name.toLowerCase().includes(filter)));
        });

        // EPG Uhrzeit Update
        setInterval(() => {
            const now = new Date();
            document.getElementById('time-indicator').textContent = now.getHours().toString().padStart(2, '0') + ":" + now.getMinutes().toString().padStart(2, '0');
        }, 1000);
    </script>
</body>
        </html>
